# Requires the GitHub Settings app to apply automatically.
# This encodes required checks for protected branches in-repo.
branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        checks:
          - context: "Validate and Build (Node 20.x)"
          - context: "lint (Node 20.x)"
          - context: "typecheck (Node 20.x)"
          - context: "test:unit (Node 20.x)"
          - context: "test:golden (Node 20.x)"
          - context: "build (Node 20.x)"
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      restrictions: null

  - name: master
    protection:
      required_status_checks:
        strict: true
        checks:
          - context: "Validate and Build (Node 20.x)"
          - context: "lint (Node 20.x)"
          - context: "typecheck (Node 20.x)"
          - context: "test:unit (Node 20.x)"
          - context: "test:golden (Node 20.x)"
          - context: "build (Node 20.x)"
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      restrictions: null
