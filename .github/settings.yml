# Declarative repository settings (for Probot Settings app / settings sync automation)
repository:
  name: atlas-chat-exporter
  default_branch: main
  private: false
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_rebase_merge: true
  allow_merge_commit: false
  allow_auto_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 2
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - "ci / lint"
          - "ci / unit-tests"
          - "ci / integration-smoke"
          - "ci / fixtures-golden"
          - "ci / release-readiness"
      enforce_admins: true
      restrictions: null
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false

labels:
  - name: release
    color: "5319e7"
    description: "Pull request includes release impact"
  - name: no-release
    color: "0e8a16"
    description: "Internal change with no release impact"
  - name: adapter-change
    color: "1d76db"
    description: "Change touches adapter package(s)"
  - name: core-change
    color: "fbca04"
    description: "Change touches shared parser/transform/render/core"
