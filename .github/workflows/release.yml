name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-modules-20.x-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-20.x-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundles
        run: pnpm run build

      - name: Package release artifacts
        run: |
          mkdir -p release-assets

          if [ -d "apps/cli/dist" ]; then
            tar -czf release-assets/cli-distributable-bundle.tar.gz -C apps/cli/dist .
          elif [ -d "dist/cli" ]; then
            tar -czf release-assets/cli-distributable-bundle.tar.gz -C dist/cli .
          fi

          if [ -f "apps/extension/dist/extension.zip" ]; then
            cp apps/extension/dist/extension.zip release-assets/extension.zip
          elif compgen -G "apps/extension/dist/*.zip" > /dev/null; then
            cp apps/extension/dist/*.zip release-assets/
          elif compgen -G "dist/extension/*.zip" > /dev/null; then
            cp dist/extension/*.zip release-assets/
          fi

          if [ -d "apps/snippets/dist" ]; then
            tar -czf release-assets/snippets-bundle.tar.gz -C apps/snippets/dist .
          elif [ -d "dist/snippets" ]; then
            tar -czf release-assets/snippets-bundle.tar.gz -C dist/snippets .
          fi

          if [ -d "apps/bookmarklets/dist" ]; then
            tar -czf release-assets/bookmarklets-bundle.tar.gz -C apps/bookmarklets/dist .
          elif [ -d "dist/bookmarklets" ]; then
            tar -czf release-assets/bookmarklets-bundle.tar.gz -C dist/bookmarklets .
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: warn

      - name: Determine release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/*
