name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    env:
      CRX_UPDATE_BASE_URL: https://wyattowalsh.github.io/atlas-chat-exporter/updates

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release metadata
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-modules-20.x-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-20.x-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration quality gate
        run: pnpm run ci

      - name: Verify CI parity
        run: pnpm run check:ci-parity

      - name: Prepare CRX signing key
        id: crx_key
        env:
          CRX_PRIVATE_KEY_PEM: ${{ secrets.CRX_PRIVATE_KEY_PEM }}
        shell: bash
        run: |
          if [ -z "${CRX_PRIVATE_KEY_PEM}" ]; then
            echo "CRX_PRIVATE_KEY_PEM secret is required for signed CRX releases." >&2
            exit 1
          fi

          KEY_PATH="$RUNNER_TEMP/crx-private-key.pem"
          umask 177
          printf '%s\n' "${CRX_PRIVATE_KEY_PEM}" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "path=${KEY_PATH}" >> "$GITHUB_OUTPUT"

      - name: Bundle snippets
        run: pnpm run bundle:snippets

      - name: Bundle bookmarklets
        run: pnpm run bundle:bookmarklets

      - name: Package extension artifacts
        run: pnpm run package:extension -- --version ${{ steps.vars.outputs.version }} --key-path ${{ steps.crx_key.outputs.path }} --update-base-url ${{ env.CRX_UPDATE_BASE_URL }}

      - name: Package release artifacts
        run: pnpm run package:release -- --version ${{ steps.vars.outputs.version }}

      - name: Stage GitHub Pages update files
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p dist/pages/updates
          cp "dist/release/atlas-chat-exporter-extension-v${VERSION}.crx" "dist/pages/updates/"
          cp "dist/release/atlas-chat-exporter-extension-v${VERSION}-update.xml" "dist/pages/updates/atlas-chat-exporter-update.xml"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/release/*
            apps/snippets/dist/*
            apps/bookmarklets/dist/*
          if-no-files-found: warn

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/release/*

      - name: Remove CRX key file
        if: always()
        run: rm -f ${{ steps.crx_key.outputs.path }}

  deploy-update-channel:
    name: Deploy update channel to GitHub Pages
    needs: build-release-assets
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
