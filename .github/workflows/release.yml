name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: 20.11.1
  PNPM_VERSION: 9.12.3

jobs:
  build-release-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js (LTS pinned)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-store.outputs.STORE_PATH }}
            **/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release targets
        run: pnpm run build

      - name: Upload CLI distributable bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-distributable-bundle
          if-no-files-found: error
          path: |
            apps/cli/dist/**
            dist/cli/**

      - name: Upload extension zip package
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip-package
          if-no-files-found: error
          path: |
            apps/extension/dist/*.zip
            dist/extension/*.zip

      - name: Upload generated snippets + bookmarklets bundles
        uses: actions/upload-artifact@v4
        with:
          name: snippets-bookmarklets-bundles
          if-no-files-found: error
          path: |
            apps/snippets/dist/**
            apps/bookmarklets/dist/**
            dist/snippets/**
            dist/bookmarklets/**

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-artifacts

    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-distributable-bundle
          path: release-assets/cli

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip-package
          path: release-assets/extension

      - name: Download snippets/bookmarklets artifact
        uses: actions/download-artifact@v4
        with:
          name: snippets-bookmarklets-bundles
          path: release-assets/snippets-bookmarklets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-release-artifacts.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/cli/**
            release-assets/extension/**
            release-assets/snippets-bookmarklets/**
