name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  validate:
    name: Validate (lint, typecheck, tests, fixtures, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Verify fixtures / golden outputs
        run: npm run verify:fixtures

      - name: Build
        run: npm run build
