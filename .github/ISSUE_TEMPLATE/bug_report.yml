name: "Bug report"
description: "Report a reproducible bug in atlas-chat-exporter"
title: "[bug] <short summary>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail for maintainers to reproduce and diagnose quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem.
      placeholder: "Export output drops code fences in long answers"
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter surface
      description: Where did you run the exporter?
      options:
        - Chromium extension
        - DevTools snippet
        - Bookmarklet
        - Userscript
        - CLI / CDP injector
        - Native launcher
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: App version, package version, or git commit SHA.
      placeholder: "v0.1.0 or abc1234"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic sequence.
      placeholder: |
        1. Open chat ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: fixture
    attributes:
      label: Fixture / DOM evidence (recommended)
      description: Attach a minimal raw DOM/HTML sample and expected markdown/json when possible.
      placeholder: "Paste snippet, attach file, or link to fixture PR."

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / output snippets
      description: Include relevant errors, console output, and redacted screenshots.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched for existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest main branch (or latest release).
          required: true
        - label: I have redacted sensitive conversation content.
          required: true
