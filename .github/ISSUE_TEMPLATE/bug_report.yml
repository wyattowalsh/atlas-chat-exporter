name: "Bug report"
description: Report a defect in extraction, transforms, rendering, or adapter behavior.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail to reproduce the issue.

        For parsing/output bugs, include fixture-like input and expected output when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: A short description of the issue.
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Select the main area impacted.
      options:
        - packages/core
        - packages/parser-dom
        - packages/transform
        - packages/render-markdown
        - packages/render-json
        - apps/extension
        - apps/snippets
        - apps/bookmarklets
        - apps/userscript
        - apps/cli
        - apps/native-launchers
        - docs
        - other
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Runtime / adapter
      description: Where did you observe the issue?
      options:
        - Atlas
        - ChatGPT Web (Chromium)
        - Extension
        - Snippet
        - Bookmarklet
        - Userscript
        - CLI / CDP
        - Native launcher
        - Not adapter-specific

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Sample input/output (sanitized)
      description: Provide representative DOM snippet, exported Markdown/JSON, or screenshots.
      render: markdown

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I sanitized sensitive/private content before submitting.
          required: true
        - label: I can provide a minimal reproducible fixture if requested.
          required: false
